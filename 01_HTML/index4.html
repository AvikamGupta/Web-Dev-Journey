<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img width="230" height="230" src="Vit.png" alt="College image">
    <!-- We can use any one of the attributes width or height -->
     <table>
        <caption>Student details</caption>
        <thead> 
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Designation</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Avikam</td>
            <td>18</td>
            <td>Student</td>
        </tr>
        <tr>
            <td>Devansh</td>
            <td>18</td>
            <td>Student</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="2">Prakhar</td>
            <td>Student</td>
        </tr>
        </tfoot>
     </table>
     <!-- this is a table tag -->
     <!-- using colspan the particular coloumn takes the number of tabs alloted to it in double quotes -->
     <!-- tr is table row th is table heading td is table data -->
      <!-- thead is header tbody is the main body and tfoot is the footer -->
       <ul type="square" >
        <li>Avikam</li>
        <li>Deva</li>
        <li>ojha</li>
       </ul>
       <!-- type section used for type of bullet -->
       <!-- ul is unordered list -->
         <ol type="I" >
        <li>Avikam</li>
        <li>Deva</li>
        <li>ojha</li>
       </ol>
       <!-- type section used for type of bullet -->
       <!-- ol is ordered list -->
        <dl>
            <dt>words</dt>
            <dd>lorem 5</dd>
            <dt>numbers</dt>
            <dd>1 2 3 4 5 </dd>
            <dt>symbols</dt>
            <dd>! @ # $ %</dd>
        </dl>
        <!-- dl is definition list dt is definition title dd is definition data -->
</body>
</html>
