<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forms-lets learn it</title>
</head>

<body>
    <form action="post"></form>
    <div>
        <h1>Form to apply for web development course</h1>
        <label for="username">Here</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
    </div>
    <div>
        <input type="radio" id="Male" name="gender" value="Male">
        <label for="Male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">female</label>
    </div>
    <div>
        <input type="checkbox" name="Ready" id="Ready" value="yes">
        <label for="Ready">Are you Ready</label>
    </div>
    <div>
        <label for="comment">Enter your comments <br></label>
        <textarea name="comment" id="comment" rows="4" cols="50"></textarea>
    </div>
    <div>
        <select name="Fruits" id="Fruits">
            <option value="apple">apple</option>
            <option value="banana">banana</option>
            <option value="kiwi">kiwi</option>
        </select>
    </div>
    </form>
</body>

</html>
